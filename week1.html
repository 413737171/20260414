<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第一週作品 - 我的程式種子</title>
    <style>
        body {
            margin: 0;
            padding: 24px;
            min-height: 100vh;
            background-color: #fff8ff;

            color: #3a2f43;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .card {
            max-width: 700px;

            margin: 0;
            color: #8b4dc5;

    <div class="card">
        <h2>第一週作品：程式的萌芽</h2>
        <p>這是第一週的作品展示區，象徵程式種子在地底悄悄發芽，慢慢長出第一個根節點。透過這個頁面，我記錄了最初的互動概念與視覺理念。</p>
